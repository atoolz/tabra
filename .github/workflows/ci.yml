name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --all-targets

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --all-targets

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets -- -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [check]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install specs (if available)
        run: |
          if [ -d "specs" ] && [ "$(ls -A specs/*.json 2>/dev/null)" ]; then
            cargo build
            mkdir -p ~/.local/share/tabra/specs
            cp specs/*.json ~/.local/share/tabra/specs/
            echo "Installed $(ls specs/*.json | wc -l) specs"
          else
            echo "No specs directory yet, skipping spec install"
          fi
      - name: Run integration tests
        run: |
          if [ -d "tests/integration" ]; then
            cargo test --test '*' -- --test-threads=1
          else
            echo "No integration tests yet, skipping (will be added in M2)"
          fi
